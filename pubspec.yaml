name: skinor
description: Skinor - Upgrade Your Skin. Boys skincare routine app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.3
  flutter_local_notifications: ^18.0.1
  provider: ^6.1.2
  intl: ^0.19.0
  fl_chart: ^0.69.0
  lottie: ^3.1.2
  animated_text_kit: ^4.2.3
  smooth_page_indicator: ^1.2.0+3
  flutter_animate: ^4.5.0
  timezone: ^0.9.4
  image_picker: ^1.1.2
  flutter_native_splash: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/pngs/

flutter_native_splash:
  color: "#1A1A2E"
  android: true
  ios: true